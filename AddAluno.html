<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Cadastrar Aluno</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" />
  <style>
    #previewFoto {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid #ccc;
      margin-bottom: 1rem;
      display: none;
    }
    .aluno-item img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 50%;
      margin-right: 1rem;
    }
  </style>
</head>
<body>

  <div id="header"></div>

  <main role="main" class="container mt-5 pt-5">
    <div class="jumbotron text-center">
      <h1>Cadastre os alunos tirando uma foto</h1>
      <div class="mb-3">
        <video id="video" width="320" height="240" autoplay style="border:1px solid #ccc;"></video>
        <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
      </div>
      <img id="previewFoto" alt="Prévia da foto">
      <div class="mb-3">
        <input type="text" id="nomeAluno" class="form-control" placeholder="Nome do aluno">
      </div>
      <button class="btn btn-primary mb-2" id="tirarFoto">Tirar Foto</button>
      <button class="btn btn-success mb-2" id="salvarAluno" disabled>Salvar</button>
    </div>
    <h3 class="mt-4">Alunos cadastrados</h3>
    <ul id="listaAlunos" class="list-group mt-3"></ul>
    <a href="ListaAlunos.html" class="btn btn-secondary mt-3">Voltar para Lista de Alunos</a>
  </main>

  <div id="footer"></div>

  <script src="main.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const previewFoto = document.getElementById('previewFoto');
    const tirarFotoBtn = document.getElementById('tirarFoto');
    const salvarAlunoBtn = document.getElementById('salvarAluno');
    const nomeAlunoInput = document.getElementById('nomeAluno');
    const listaAlunos = document.getElementById('listaAlunos');
    let fotoBase64 = '';

    // Ativa a câmera
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(err => alert('Erro ao acessar a câmera: ' + err));

    tirarFotoBtn.addEventListener('click', () => {
      canvas.style.display = 'block';
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      fotoBase64 = canvas.toDataURL('image/png');
      previewFoto.src = fotoBase64;
      previewFoto.style.display = 'block';
      salvarAlunoBtn.disabled = false;
    });

    salvarAlunoBtn.addEventListener('click', () => {
      const nome = nomeAlunoInput.value.trim();
      if (!nome || !fotoBase64) {
        alert('Preencha o nome e tire a foto!');
        return;
      }

      // Envia para o backend Python
      fetch('http://127.0.0.1:5000/cadastrar', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          nome: nome,
          foto: fotoBase64
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === 'ok') {
          alert('Aluno cadastrado com sucesso no backend!');
          nomeAlunoInput.value = '';
          previewFoto.style.display = 'none';
          salvarAlunoBtn.disabled = true;
          fotoBase64 = '';
          carregarAlunos(); // Atualiza a lista após cadastrar
        } else {
          alert('Erro ao cadastrar no backend!');
        }
      })
      .catch(() => alert('Erro ao conectar com o backend Python!'));
    });

    // Função para carregar a lista de alunos do backend
    function carregarAlunos() {
      fetch('http://127.0.0.1:5000/alunos')
        .then(res => res.json())
        .then(alunos => {
          listaAlunos.innerHTML = '';
          alunos.forEach(aluno => {
            const li = document.createElement('li');
            li.className = 'list-group-item d-flex align-items-center justify-content-between aluno-item';
            li.innerHTML = `
              <span>
                <img src="${aluno.foto}" alt="${aluno.nome}">
                ${aluno.nome}
              </span>
              <button class="btn btn-danger btn-sm btn-excluir">Excluir</button>
            `;
            // Botão excluir
            li.querySelector('.btn-excluir').addEventListener('click', function() {
              if (confirm('Tem certeza que deseja excluir este aluno?')) {
                fetch('http://127.0.0.1:5000/excluir', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ nome: aluno.nome })
                })
                .then(res => res.json())
                .then(data => {
                  if (data.status === 'ok') {
                    li.remove();
                  } else {
                    alert('Erro ao excluir: ' + (data.mensagem || 'Erro desconhecido'));
                  }
                })
                .catch(() => alert('Erro ao conectar com o backend Python!'));
              }
            });
            listaAlunos.appendChild(li);
          });
        });
    }

    // Carrega a lista ao abrir a página
    carregarAlunos();
  </script>
</body>
</html>
