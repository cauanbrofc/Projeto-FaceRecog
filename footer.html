
<style>
  :root {
    --primary-gradient: linear-gradient(90deg, #2e86de 70%, #48dbfb 100%);
    --highlight-color: #2e86de;
    --accent-color: #48dbfb;
    --success-color: #10ac84;
  }

  footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: var(--primary-gradient);
    color: #fff;
    padding: 0.6rem 0;
    font-size: 0.75rem;
    text-align: center;
    z-index: 1000;
    box-shadow: 0 -2px 12px rgba(46, 134, 222, 0.2);
    border-top: 1px solid #48dbfb;
  }

  footer .container {
    display: flex;
    flex-direction: row;
    gap: 0.5rem;
    justify-content: center;
    align-items: center;
  }

  .footer-content {
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .footer-brand {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
  }

  .footer-brand i {
    font-size: 0.9rem;
  }

  .footer-text {
    margin: 0;
    color: #fff;
    font-weight: 500;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
    font-size: 0.75rem;
  }

  .footer-icons {
    display: flex;
    gap: 0.6rem;
    align-items: center;
  }

  .footer-icons a {
    color: #fff;
    font-size: 0.9rem;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
  }

  .footer-icons a:hover {
    background: #fff;
    color: #2e86de;
    transform: translateY(-2px) scale(1.1);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  }

  .footer-divider {
    width: 2px;
    height: 30px;
    background: rgba(255, 255, 255, 0.3);
  }

  .footer-links {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .footer-links a {
    color: #fff;
    text-decoration: none;
    font-weight: 500;
    transition: all 0.2s;
    font-size: 0.95rem;
  }

  .footer-links a:hover {
    color: #fff;
    text-decoration: underline;
    transform: translateY(-2px);
  }

  @media (max-width: 767px) {
    footer {
      padding: 0.4rem 0;
      font-size: 0.7rem;
    }

    .footer-content {
      flex-direction: row;
      gap: 0.5rem;
    }

    .footer-brand {
      font-size: 0.75rem;
    }

    .footer-icons {
      gap: 0.4rem;
    }

    .footer-icons a {
      width: 24px;
      height: 24px;
      font-size: 0.75rem;
    }

    .footer-divider {
      display: none;
    }
  }
</style>

<div style="height: 60px;"></div>
<footer>
  <div class="container">
    <div class="footer-content">
      <div class="footer-brand">
        <i class="bi bi-mortarboard"></i> Facerool
      </div>
      <p class="footer-text">&copy; 2026 Facerool. Tecnologia em Educação.</p>
      <div style="display: flex; align-items: center; gap: 0.7rem;">
        <div class="footer-icons">
          <a href="https://facebook.com" target="_blank" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
          <a href="https://twitter.com" target="_blank" aria-label="Twitter"><i class="bi bi-twitter"></i></a>
          <a href="https://instagram.com" target="_blank" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
          <a href="https://linkedin.com" target="_blank" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
        </div>
      </div>
    </div>
  </div>
</footer>
