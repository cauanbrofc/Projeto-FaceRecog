<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Chamadas de Alunos</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" />
  <style>
    #listaAlunos .list-group-item {
      background-color: #1e1e1e;
      color: #e0e0e0;
    }
    #listaAlunos .list-group-item:nth-child(odd) {
      background-color: #2a2a2a;
    }
    #listaAlunos .list-group-item:nth-child(even) {
      background-color: #1e1e1e;
    }
  </style>
</head>
<body>

  <!-- Carregar o header.html -->
  <div id="header"></div>

  <!-- Conteúdo principal -->
  <main class="container mt-5 pt-5 text-center" style="max-width: 600px;">
    <h2 class="mb-4">Faça a Chamada dos Alunos</h2>

    <!-- Botões de câmera -->
    <div class="mb-4">
      <button class="btn btn-primary" id="abrirCamera">Abrir Câmera</button>
      <button class="btn btn-success" id="tirarFoto" disabled>Tirar Foto</button>
    </div>

    <!-- Área da câmera e foto -->
    <div>
      <video id="video" width="320" height="240" autoplay class="mb-3 mx-auto" style="display: none; border: 2px solid #ccc;"></video>
      <canvas id="canvas" width="320" height="240" class="mx-auto" style="display: none;"></canvas>
    </div>

    <!-- Lista de alunos -->
    <div class="mt-4 text-left">
      <h4>Alunos Presentes:</h4>
      <ul id="listaAlunos" class="list-group"></ul>
    </div>
  </main>

  <!-- Carregar o footer.html -->
  <div id="footer"></div>

  <!-- Scripts -->
  <script src="main.js"></script>
  <script>
    const abrirCameraBtn = document.getElementById('abrirCamera');
    const tirarFotoBtn = document.getElementById('tirarFoto');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const listaAlunos = document.getElementById('listaAlunos');
    const ctx = canvas.getContext('2d');

    let streamAtivo = false;

    abrirCameraBtn.addEventListener('click', () => {
      if (!streamAtivo) {
        navigator.mediaDevices.getUserMedia({ video: true })
          .then(stream => {
            video.srcObject = stream;
            video.style.display = 'block';
            tirarFotoBtn.disabled = false;
            streamAtivo = true;
          })
          .catch(err => alert('Erro ao acessar a câmera: ' + err));
      }
    });

    tirarFotoBtn.addEventListener('click', () => {
      canvas.style.display = 'block';
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imagem = canvas.toDataURL('image/png');

      // Envia a imagem para o backend para reconhecimento
      fetch('http://127.0.0.1:5000/reconhecer', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json' 
        },
        body: JSON.stringify({ 
          imagem: imagem
        })
      })
      .then(res => res.json())
      .then(data => {
        const nomes = data.nomes || [];
        if (nomes.length === 0) {
          alert('Nenhum aluno reconhecido. Tente novamente.');
          return;
        } else {
          alert(nomes.length + ' aluno(s) reconhecido(s)!');
        }
        listaAlunos.innerHTML = ''; // Limpa a lista antes de adicionar novos alunos
        nomes.forEach(nome => {
          const li = document.createElement('li');
          li.className = 'list-group-item';
          li.textContent = nome;
          listaAlunos.appendChild(li);
        });
      })
      .catch(e => {
        alert('Erro ao reconhecer o aluno!'+ e);
      });
    });
  </script>
</body>
</html>
