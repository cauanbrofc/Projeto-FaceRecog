<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Lista de Alunos</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
  <style>
    .aluno-item img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 50%;
      margin-right: 1rem;
    }
  </style>
</head>
<body>

  <div id="header"></div>

  <main class="container mt-5 pt-5" style="width: 50%; min-width: 150px; justify-self:center;">
    <h2 style="justify-self: center;">Lista dos Alunos</h2>
    <div id="alunos-list"></div>
  </main>
  <div id="footer"></div>

  <script>
    function carregarAlunos() {
      fetch('http://127.0.0.1:5000/alunos')
        .then(res => res.json())
        .then(alunos => {
          const alunosList = document.getElementById('alunos-list');
          alunosList.innerHTML = '';
          alunos.forEach(aluno => {
            const div = document.createElement('div');
            div.className = 'aluno-item d-flex align-items-center mb-3 justify-content-between';
            div.innerHTML = `
              <span class="d-flex align-items-center">
                <img src="${aluno.foto}" alt="${aluno.nome}">
                <span>${aluno.nome}</span>
              </span>
              <button class="btn btn-danger btn-sm btn-excluir">Excluir</button>
            `;
            div.querySelector('.btn-excluir').addEventListener('click', function() {
              if (confirm('Tem certeza que deseja excluir este aluno?')) {
                fetch('http://127.0.0.1:5000/excluir', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ nome: aluno.nome })
                })
                .then(res => res.json())
                .then(data => {
                  if (data.status === 'ok') {
                    carregarAlunos();
                  } else {
                    alert('Erro ao excluir: ' + (data.mensagem || 'Erro desconhecido'));
                  }
                })
                .catch(() => alert('Erro ao conectar com o backend Python!'));
              }
            });
            alunosList.appendChild(div);
          });
        });
    }

    carregarAlunos();
  </script>
  <script src="main.js"></script>
</body>
</html>
